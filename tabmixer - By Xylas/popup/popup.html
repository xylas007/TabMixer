<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabMixer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon-wrap">
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="9" fill="url(#iconGrad)"/>
          <path d="M7 11.5v9h5L18 26V6l-6 5.5H7z" fill="white"/>
          <path d="M20 16c0-2.3-1.3-4.4-3.3-5.5v11c2-1.1 3.3-3.2 3.3-5.5z" fill="white" opacity="0.75"/>
          <path d="M22.5 16c0-3.5-1.9-6.7-5-8.5v2.5c2.2 1.5 3.5 4 3.5 6s-1.3 4.5-3.5 6v2.5c3.1-1.8 5-5 5-8.5z" fill="white" opacity="0.4"/>
          <defs>
            <linearGradient id="iconGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6056E8"/>
              <stop offset="1" stop-color="#A855F7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">TabMixer</span>
        <span class="brand-sub">by XYLAS</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="themeBtn" title="Toggle theme"></button>
      <button class="btn-reset" id="resetAllBtn" title="Reset all tabs to 100%">
        <svg viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="11,0.5 13.5,2.5 11.5,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Reset All
      </button>
    </div>
  </header>

  <!-- Status -->
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="tabCount">Scanning...</span>
  </div>

  <!-- Main -->
  <main class="main" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="23" fill="rgba(96,86,232,0.08)" stroke="rgba(96,86,232,0.18)" stroke-width="1.5"/>
          <path d="M13 20v12h7l9 9V11l-9 9h-7z" stroke="#7C6FF7" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M31 21.5a7 7 0 0 1 0 9" stroke="#7C6FF7" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
          <line x1="10" y1="10" x2="42" y2="42" stroke="#7C6FF7" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
        </svg>
      </div>
      <p class="empty-title">No Audio Playing</p>
      <p class="empty-desc">Open a tab with audio to start mixing</p>
    </div>
    <div class="tab-list" id="tabList"></div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <a class="watermark" href="#" id="githubLink" title="XYLAS on GitHub">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      XYLAS
    </a>
    <span class="footer-sep">·</span>
    <span class="footer-tip">Up to 600% · Precision mode</span>
  </footer>

  <!-- Tab Card Template -->
  <template id="tabCardTemplate">
    <div class="tab-card">
      <div class="tab-header">
        <img class="tab-favicon" src="" alt="" loading="lazy">
        <span class="tab-title"></span>
        <div class="tab-controls">
          <button class="mute-btn" title="Mute / Unmute">
            <svg class="icon-vol" viewBox="0 0 20 20" fill="currentColor"><path d="M4.5 7.5v5h3L12 17V3L7.5 7.5h-3z"/><path d="M13.5 10c0-1.77-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.33 2.5-4.1z"/></svg>
            <svg class="icon-mute" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4.5 7.5v5h3L12 17V3L7.5 7.5h-3z" fill="none"/><line x1="15" y1="7" x2="19" y2="11"/><line x1="19" y1="7" x2="15" y2="11"/></svg>
          </button>
          <div class="vol-stepper">
            <button class="step-btn step-down" title="−5%">−</button>
            <span class="vol-display">100%</span>
            <button class="step-btn step-up" title="+5%">+</button>
          </div>
        </div>
      </div>
      <div class="slider-section">
        <span class="range-label">0</span>
        <div class="slider-wrap">
          <div class="baseline-marker"></div>
          <input type="range" class="vol-slider" min="0" max="1000" value="500" step="1">
        </div>
        <span class="range-label boost-label">6×</span>
      </div>
      <div class="preset-row">
        <button class="preset-btn" data-vol="0">Mute</button>
        <button class="preset-btn" data-vol="5">5%</button>
        <button class="preset-btn" data-vol="25">25%</button>
        <button class="preset-btn" data-vol="50">50%</button>
        <button class="preset-btn" data-vol="100">100%</button>
        <button class="preset-btn" data-vol="200">2×</button>
        <button class="preset-btn" data-vol="400">4×</button>
      </div>
    </div>
  </template>

  <script src="popup.js"></script>
</body>
</html>
